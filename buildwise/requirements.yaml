packages:
  "framer-motion": "For fluid page transitions and rich micro-interactions in the enterprise interface"
  "recharts": "For rendering project completion, burndown, and dashboard analytics charts"
  "date-fns": "For elegant date formatting across project timelines and vendor pipelines"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to resolve Tailwind CSS class conflicts"
  "lucide-react": "Clean, professional icon set matching the enterprise theme"

images:
  - path: "Frontend/buildwise/public/images/auth-bg.png"
    description: "Deep corporate navy blue abstract geometric mesh with subtle glowing data lines, enterprise technology aesthetic, extremely minimal and professional"
    aspect_ratio: "16:9"
  - path: "Frontend/buildwise/public/images/logo-mark.png"
    description: "Minimalist geometric letter F and R interlocking logo mark, tech enterprise style, glowing blue on transparent background"
    aspect_ratio: "1:1"

notes:
  - "The app relies on the provided Orval-generated React Query hooks from @workspace/api-client-react"
  - "Routing is handled by wouter, ensuring standard Anchor tags are NOT nested inside Link components"
  - "The UI is designed as 'Dark Mode Only' to fit the 'Enterprise Dark Professional' aesthetic requested"
